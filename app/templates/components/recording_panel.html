<!-- Recording panel — voice-to-text (requires recorder.js) -->
<div class="border border-border rounded-lg p-3 bg-panel">
  <div class="flex items-center gap-3 mb-2">
    <button type="button" id="record-btn"
            onclick="toggleRecording()"
            class="flex items-center gap-2 px-3 py-1.5 rounded border border-border text-xs text-subtle hover:border-muted hover:text-primary transition-colors">
      <span id="record-dot" class="w-2 h-2 rounded-full bg-gray-600"></span>
      <span id="record-label">Record</span>
    </button>

    <!-- STT engine badge -->
    <span id="stt-badge" class="text-xs text-muted"></span>

    <!-- Real-time emotion -->
    <span id="live-emotion" class="text-xs text-subtle italic ml-auto"></span>
  </div>

  <!-- Waveform canvas -->
  <canvas id="waveform" width="600" height="40"
          class="w-full h-10 rounded hidden"
          style="background:#0a0a0a"></canvas>

  <!-- Live transcript preview (while recording) -->
  <div id="partial-transcript"
       class="hidden mt-2 text-xs text-subtle font-mono italic min-h-[1.5em] pl-1"></div>
</div>
